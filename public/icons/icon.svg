<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" ry="128" fill="url(#bg)"/>
  
  <!-- Subtle pattern -->
  <circle cx="380" cy="120" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="100" cy="400" r="60" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Wallet/Card shape -->
  <rect x="96" y="176" width="320" height="200" rx="24" fill="#fff" filter="url(#shadow)"/>
  <rect x="96" y="176" width="320" height="60" rx="24" fill="#f3f4f6"/>
  <rect x="96" y="220" width="320" height="16" fill="#e5e7eb"/>
  
  <!-- Dollar sign -->
  <text x="256" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="140" font-weight="700" fill="#3b82f6" text-anchor="middle">$</text>
  
  <!-- Card chip -->
  <rect x="120" y="250" width="40" height="30" rx="6" fill="#d4af37"/>
  <line x1="130" y1="250" x2="130" y2="280" stroke="#b8941d" stroke-width="1"/>
  <line x1="140" y1="250" x2="140" y2="280" stroke="#b8941d" stroke-width="1"/>
  <line x1="120" y1="260" x2="160" y2="260" stroke="#b8941d" stroke-width="1"/>
  <line x1="120" y1="270" x2="160" y2="270" stroke="#b8941d" stroke-width="1"/>
  
  <!-- Card number dots -->
  <circle cx="200" cy="265" r="4" fill="#9ca3af"/>
  <circle cx="215" cy="265" r="4" fill="#9ca3af"/>
  <circle cx="230" cy="265" r="4" fill="#9ca3af"/>
  <circle cx="245" cy="265" r="4" fill="#9ca3af"/>
</svg>