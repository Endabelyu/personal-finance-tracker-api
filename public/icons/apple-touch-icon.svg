<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  
  <!-- Background for Apple touch icon (no transparency) -->
  <rect width="180" height="180" rx="40" ry="40" fill="url(#bg)"/>
  
  <!-- Dollar sign centered -->
  <text x="90" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="100" font-weight="700" fill="#fff" text-anchor="middle">$</text>
</svg>