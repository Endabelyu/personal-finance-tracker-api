<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3b82f6" />
  <title>Offline - Personal Finance Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
      color: #1f2937;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
        color: #f9fafb;
      }
    }
    
    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
    }
    
    .icon svg {
      width: 60px;
      height: 60px;
      color: white;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.025em;
    }
    
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #6b7280;
      margin-bottom: 32px;
    }
    
    @media (prefers-color-scheme: dark) {
      p {
        color: #9ca3af;
      }
    }
    
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      min-height: 48px;
    }
    
    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 12px -2px rgba(59, 130, 246, 0.3);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 10px;
      font-size: 14px;
      color: #6b7280;
    }
    
    @media (prefers-color-scheme: dark) {
      .status {
        background: rgba(255, 255, 255, 0.1);
        color: #9ca3af;
      }
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .cached-data {
      margin-top: 32px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 16px;
      text-align: left;
    }
    
    @media (prefers-color-scheme: dark) {
      .cached-data {
        background: rgba(255, 255, 255, 0.1);
      }
    }
    
    .cached-data h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .cached-data ul {
      list-style: none;
    }
    
    .cached-data li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      font-size: 14px;
      color: #6b7280;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }
    
    .cached-data li:last-child {
      border-bottom: none;
    }
    
    .cached-data li svg {
      width: 16px;
      height: 16px;
      color: #10b981;
      flex-shrink: 0;
    }
    
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    .button.loading .spinner {
      display: inline-block;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    <p>Don't worry! Your financial data is safe. You can still view cached information and any changes will sync when you reconnect.</p>
    
    <button class="button" onclick="retryConnection()" id="retryBtn">
      <span class="spinner"></span>
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
        <path d="M16 16h5v5"/>
      </svg>
      Try Again
    </button>
    
    <div class="status">
      <span class="status-dot"></span>
      <span id="statusText">Waiting for network...</span>
    </div>
    
    <div class="cached-data">
      <h2>Available Offline</h2>
      <ul>
        <li>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
          Dashboard overview
        </li>
        <li>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
          Recent transactions
        </li>
        <li>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
          Budget summaries
        </li>
        <li>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
          Account balances
        </li>
      </ul>
    </div>
  </div>
  
  <script>
    // Check online status
    function updateStatus() {
      const statusText = document.getElementById('statusText');
      const statusDot = document.querySelector('.status-dot');
      
      if (navigator.onLine) {
        statusText.textContent = 'Back online! Redirecting...';
        statusDot.style.background = '#10b981';
        statusDot.style.animation = 'none';
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      } else {
        statusText.textContent = 'Waiting for network...';
        statusDot.style.background = '#ef4444';
        statusDot.style.animation = 'pulse 2s infinite';
      }
    }
    
    function retryConnection() {
      const btn = document.getElementById('retryBtn');
      btn.classList.add('loading');
      
      // Try to reload
      setTimeout(() => {
        window.location.reload();
      }, 500);
    }
    
    // Listen for online/offline events
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    
    // Initial check
    updateStatus();
  </script>
</body>
</html>
