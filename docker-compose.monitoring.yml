services:
  prometheus:
    image: prom/prometheus:latest
    container_name: finance-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - finance-tracker-network

  loki:
    image: grafana/loki:latest
    container_name: finance-loki
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - finance-tracker-network

  promtail:
    image: grafana/promtail:latest
    container_name: finance-promtail
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail.yml
    restart: unless-stopped
    depends_on:
      - loki
    networks:
      - finance-tracker-network

  grafana:
    image: grafana/grafana:latest
    container_name: finance-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3200:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    networks:
      - finance-tracker-network

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  finance-tracker-network:
    external: true  # Must match the network declared in docker-compose.yml
